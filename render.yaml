services:
  - type: web
    name: c2c-prototype
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: VERIFY_TOKEN
        value: c2c_verify
      - key: PYTHON_VERSION
        value: 3.11.9
